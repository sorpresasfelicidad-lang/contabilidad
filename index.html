<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Tributario: IVA, Retefuente e ICA</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: rgba(19, 27, 38, 0.88);
      --panel-2: rgba(13, 18, 26, 0.9);
      --border: rgba(125, 170, 255, 0.18);
      --text: #edf3ff;
      --muted: #9eb0c9;
      --accent: #7cc7ff;
      --accent-2: #8effc1;
      --good: #79f2b2;
      --bad: #ff7d96;
      --shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 18px 60px rgba(0,0,0,0.45);
      --glow: 0 0 10px rgba(124, 199, 255, 0.18), 0 0 22px rgba(142, 255, 193, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 199, 255, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(142, 255, 193, 0.08), transparent 22%),
        linear-gradient(180deg, #071018 0%, #0b0f14 55%, #0a0d13 100%);
      display: flex;
      justify-content: center;
      padding: 32px 16px 40px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;
    }

    body::before {
      top: -80px;
      left: -90px;
      background: rgba(124, 199, 255, 0.35);
    }

    body::after {
      right: -80px;
      bottom: -100px;
      background: rgba(142, 255, 193, 0.22);
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      position: relative;
      z-index: 1;
    }

    .title-box,
    .quiz-box,
    .footer-box {
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .title-box {
      padding: 16px 18px; /* antes 28px 24px */
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 2.8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      text-wrap: balance;
      text-shadow: 0 0 16px rgba(124, 199, 255, 0.12);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .quiz-box {
      padding: 22px;
    }

    .bottombar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.025);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .stat strong {
      font-size: 1.15rem;
    }

    .question-panel {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 22px;
      padding: 22px;
      background: rgba(255,255,255,0.02);
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .question {
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      line-height: 1.45;
      margin: 6px 0 18px;
      font-weight: 700;
      color: var(--text);
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      width: 100%;
      border: 1px solid rgba(124, 199, 255, 0.18);
      background: linear-gradient(180deg, rgba(14, 22, 33, 0.95), rgba(10, 16, 24, 0.95));
      color: var(--text);
      padding: 16px 18px;
      border-radius: 18px;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      box-shadow: 0 0 0 rgba(0,0,0,0), var(--glow);
    }

    .option:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: rgba(124, 199, 255, 0.34);
      box-shadow: 0 10px 28px rgba(0,0,0,0.22), 0 0 16px rgba(124, 199, 255, 0.16);
    }

    .option:disabled {
      cursor: default;
      opacity: 0.92;
    }

    .option.correct {
      border-color: rgba(121, 242, 178, 0.55);
      box-shadow: 0 0 18px rgba(121, 242, 178, 0.22);
      background: linear-gradient(180deg, rgba(14, 40, 28, 0.95), rgba(10, 28, 20, 0.95));
    }

    .option.wrong {
      border-color: rgba(255, 125, 150, 0.52);
      box-shadow: 0 0 18px rgba(255, 125, 150, 0.20);
      background: linear-gradient(180deg, rgba(46, 18, 26, 0.95), rgba(31, 11, 17, 0.95));
    }

    .feedback {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
    }

    .feedback.good {
      color: #dfffee;
      border-color: rgba(121, 242, 178, 0.28);
      background: rgba(121, 242, 178, 0.08);
      box-shadow: 0 0 18px rgba(121, 242, 178, 0.12);
    }

    .feedback.bad {
      color: #ffe3e9;
      border-color: rgba(255, 125, 150, 0.26);
      background: rgba(255, 125, 150, 0.08);
      box-shadow: 0 0 18px rgba(255, 125, 150, 0.10);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .next-btn,
    .restart-btn {
      border: 1px solid rgba(124, 199, 255, 0.28);
      background: linear-gradient(180deg, rgba(17, 29, 42, 1), rgba(11, 19, 28, 1));
      color: var(--text);
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 0 16px rgba(124, 199, 255, 0.14);
    }

    .next-btn:hover:not(:disabled),
    .restart-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 22px rgba(124, 199, 255, 0.18);
    }

    .next-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result {
      display: none;
      text-align: center;
      padding: 18px 8px 4px;
    }

    .result.show {
      display: block;
    }

    .result h2 {
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      margin: 0 0 12px;
      text-shadow: 0 0 12px rgba(124, 199, 255, 0.12);
    }

    .score {
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 12px;
    }

    .message {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 18px;
    }

    .footer-box {
      margin-top: 18px;
      padding: 18px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .footer-box strong {
      color: var(--text);
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .bottombar {
        grid-template-columns: 1fr;
      }

      .quiz-box,
      .title-box,
      .footer-box,
      .question-panel {
        border-radius: 18px;
      }

      .question-panel {
        min-height: auto;
      }

      .actions {
        justify-content: stretch;
      }

      .next-btn,
      .restart-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="title-box">
      <h1>Quiz Tributario: IVA, Retefuente e ICA</h1>
    </section>

    <section class="quiz-box">

      <div class="question-panel" id="questionPanel">
        <div>
          <div class="question" id="questionText"></div>
          <div class="options" id="optionsContainer"></div>
          <div class="feedback" id="feedback">Selecciona una respuesta para continuar.</div>
        </div>

        <div class="actions">
          <button id="nextBtn" class="next-btn" disabled>Siguiente</button>
        </div>
      </div>

      <div class="result" id="resultBox">
        <h2>Resultado final</h2>
        <div class="score" id="scoreText"></div>
        <div class="message" id="finalMessage"></div>
        <button class="restart-btn" id="restartBtn">Volver a intentar</button>
      </div>

      <div class="bottombar">
        <div class="stat">
          <span class="stat-label">Pregunta</span>
          <strong id="progress">1 / 10</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Buenas</span>
          <strong id="correctCount">0</strong>
        </div>
        <div class="stat">
          <span class="stat-label">Malas</span>
          <strong id="wrongCount">0</strong>
        </div>
      </div>
      
    </section>

    <section class="footer-box">
      <strong>Integrantes:</strong> Fulana, Sutana, Perencejo & Bisbirudolfo
    </section>
  </div>

  <script>
    const questions = [
      {
        question: "¿Qué significa IVA?",
        options: [
          "A. Impuesto de Valor Agregado",
          "B. Ingreso de Ventas Anuales",
          "C. Indicador de Ventas Aplicadas"
        ],
        correct: 0
      },
      {
        question: "La retefuente es principalmente:",
        options: [
          "A. Un descuento o anticipo de un impuesto",
          "B. Un subsidio del gobierno",
          "C. Un préstamo bancario"
        ],
        correct: 0
      },
      {
        question: "El ICA está relacionado con:",
        options: [
          "A. Actividades industriales, comerciales y de servicios",
          "B. Únicamente salarios",
          "C. Solamente importaciones"
        ],
        correct: 0
      },
      {
        question: "Cuando una venta tiene IVA, ese valor normalmente se:",
        options: [
          "A. Cobra junto con el precio del producto o servicio",
          "B. Ignora por completo",
          "C. Convierte en descuento automático"
        ],
        correct: 0
      },
      {
        question: "La retefuente se llama así porque:",
        options: [
          "A. Se retiene en el momento del pago o abono",
          "B. Se paga solo al final del año sin anticipos",
          "C. Solo aplica en compras de contado pequeñas"
        ],
        correct: 0
      },
      {
        question: "¿Quién suele establecer el ICA?",
        options: [
          "A. El municipio o distrito",
          "B. Únicamente bancos privados",
          "C. Las universidades"
        ],
        correct: 0
      },
      {
        question: "Si una respuesta en el quiz está bien, el sistema debe marcarla como:",
        options: [
          "A. Correcta",
          "B. Oculta",
          "C. Eliminada"
        ],
        correct: 0
      },
      {
        question: "El IVA, la retefuente y el ICA pertenecen al tema de:",
        options: [
          "A. Tributos e impuestos",
          "B. Deportes y recreación",
          "C. Meteorología"
        ],
        correct: 0
      },
      {
        question: "En este quiz, no se puede pasar a la siguiente pregunta sin:",
        options: [
          "A. Responder primero la actual",
          "B. Recargar la página",
          "C. Escribir una contraseña"
        ],
        correct: 0
      },
      {
        question: "Al final del quiz se muestra:",
        options: [
          "A. Un resultado con buenas, malas y mensaje final",
          "B. Solo una pantalla en blanco",
          "C. Un formulario de registro obligatorio"
        ],
        correct: 0
      }
    ];

    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const progress = document.getElementById('progress');
    const correctCount = document.getElementById('correctCount');
    const wrongCount = document.getElementById('wrongCount');
    const questionPanel = document.getElementById('questionPanel');
    const resultBox = document.getElementById('resultBox');
    const scoreText = document.getElementById('scoreText');
    const finalMessage = document.getElementById('finalMessage');
    const restartBtn = document.getElementById('restartBtn');

    let currentQuestion = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let answered = false;

    function audioBeep(type = 'good') {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const ctx = new AudioContextClass();
      const now = ctx.currentTime;

      function tone(freq, start, duration, gainValue, wave = 'sine') {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = wave;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(gainValue, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + duration + 0.02);
      }

      if (type === 'good') {
        tone(880, now, 0.12, 0.05, 'sine');
        tone(1174, now + 0.14, 0.14, 0.05, 'sine');
      } else {
        tone(240, now, 0.16, 0.05, 'sawtooth');
        tone(180, now + 0.12, 0.20, 0.045, 'triangle');
      }

      setTimeout(() => ctx.close(), 500);
    }

    function loadQuestion() {
      answered = false;
      nextBtn.disabled = true;
      feedback.textContent = 'Selecciona una respuesta para continuar.';
      feedback.className = 'feedback';
    
      const q = questions[currentQuestion];
      progress.textContent = `${currentQuestion + 1} / ${questions.length}`;
      questionText.textContent = q.question;
      optionsContainer.innerHTML = '';
    
      q.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option';
        button.textContent = option;
        button.addEventListener('click', () => selectAnswer(index, button));
        optionsContainer.appendChild(button);
      });
    }

    function selectAnswer(index, selectedButton) {
      if (answered) return;
      answered = true;

      const q = questions[currentQuestion];
      const buttons = Array.from(document.querySelectorAll('.option'));

      buttons.forEach(btn => btn.disabled = true);

      if (index === q.correct) {
        selectedButton.classList.add('correct');
        feedback.textContent = 'Correcto. Muy bien.';
        feedback.className = 'feedback good';
        correctAnswers++;
        correctCount.textContent = correctAnswers;
        audioBeep('good');
      } else {
        selectedButton.classList.add('wrong');
        buttons[q.correct].classList.add('correct');
        feedback.textContent = 'Equivocado. Esa no era la respuesta correcta.';
        feedback.className = 'feedback bad';
        wrongAnswers++;
        wrongCount.textContent = wrongAnswers;
        audioBeep('bad');
      }

      nextBtn.disabled = false;
    }

    function getFinalMessage(score, total) {
      const ratio = score / total;
      if (ratio === 1) return 'Excelente. Dominas muy bien estas bases tributarias.';
      if (ratio >= 0.8) return 'Muy buen trabajo. Vas por muy buen camino.';
      if (ratio >= 0.6) return 'Bien hecho. Tienes una base buena y puedes seguir mejorando.';
      if (ratio >= 0.4) return 'Buen intento. Con un repaso corto lo mejoras bastante.';
      return 'Ánimo. Este es un buen comienzo para practicar lo básico.';
    }

    function showResults() {
      questionPanel.style.display = 'none';
      resultBox.classList.add('show');
      scoreText.textContent = `Obtuviste ${correctAnswers} de ${questions.length} correctas.`;
      finalMessage.textContent = `${getFinalMessage(correctAnswers, questions.length)} Buenas: ${correctAnswers}. Malas: ${wrongAnswers}.`;
    }

    nextBtn.addEventListener('click', () => {
      if (!answered) return;

      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    });

    restartBtn.addEventListener('click', () => {
      currentQuestion = 0;
      correctAnswers = 0;
      wrongAnswers = 0;
      correctCount.textContent = '0';
      wrongCount.textContent = '0';
      resultBox.classList.remove('show');
      questionPanel.style.display = 'flex';
      loadQuestion();
    });

    loadQuestion();
  </script>
</body>
</html>
